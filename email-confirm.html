<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メール確認</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .logo-container {
            margin: 20px 0 40px;
        }

        .logo {
            width: 180px;
            height: auto;
        }

        /* --- 確認前 --- */
        #before-click .message-box {
            background-color: #ffffff;
            padding: 30px;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        #before-click .message-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 6px; height: 100%;
            background-color: #007BFF;
        }

        #before-click .message-box p {
            font-size: 16px;
            color: #444;
            line-height: 1.9;
            margin: 0;
        }

        .confirm-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 18px 48px;
            background: linear-gradient(135deg, #007BFF, #0056b3);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .confirm-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0, 123, 255, 0.4);
        }

        .confirm-btn:active {
            transform: translateY(0);
        }

        /* --- 確認後 --- */
        #after-click {
            display: none;
        }

        .success-icon {
            font-size: 70px;
            color: #28a745;
            margin-bottom: 10px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #0056b3;
            margin: 10px 0 30px;
        }

        .done-box {
            background-color: #ffffff;
            padding: 30px;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        .done-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 6px; height: 100%;
            background-color: #28a745;
        }

        .done-box p {
            font-size: 16px;
            color: #444;
            line-height: 1.9;
            margin: 0;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
<body>
    <div class="container">

        <div class="logo-container">
            <img src="logo.png" alt="JBレンタカー" class="logo">
        </div>

        <!-- 確認前 -->
        <div id="before-click">
            <div class="message-box">
                <p>JBレンタカーよりメールをお送りしております。<br>
                メールをご確認いただけましたら、<br>
                下のボタンを押してください。</p>
            </div>
            <button class="confirm-btn" onclick="onConfirm()">メールを確認しました</button>
        </div>

        <!-- 確認後 -->
        <div id="after-click">
            <div class="success-icon fade-in">✓</div>
            <div class="title fade-in">メールのご確認ありがとうございました</div>
            <div class="done-box fade-in">
                <p>ご確認いただきありがとうございます。<br>
                ご不明な点がございましたら、<br>
                お気軽にお問い合わせください。</p>
            </div>
            <div style="margin-top: 30px;">
                <a href="tel:0120-204-625" style="
                    display: inline-block;
                    padding: 12px 28px;
                    background-color: #007BFF;
                    color: #fff;
                    border-radius: 50px;
                    text-decoration: none;
                    font-weight: bold;
                    box-shadow: 0 4px 15px rgba(0,123,255,0.2);
                ">📞 フリーダイヤル: 0120-204-625</a>
            </div>
        </div>

    </div>

    <script>
        function onConfirm() {
            document.getElementById('before-click').style.display = 'none';
            const after = document.getElementById('after-click');
            after.style.display = 'block';
            // アニメーションを再適用
            after.querySelectorAll('.fade-in').forEach(function(el, i) {
                el.style.opacity = '0';
                el.style.animation = 'none';
                setTimeout(function() {
                    el.style.animation = 'fadeIn 0.6s ease ' + (i * 0.2) + 's forwards';
                }, 10);
            });
        }
    </script>
</body>
</html>
